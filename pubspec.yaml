name: event_management_app
description: A cross-platform event management app for FYP with blue and white UI.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter



  # UI and features
  qr_flutter: ^4.1.0          # For QR code generation
  mobile_scanner: ^5.1.1       # Camera-based QR scanning on mobile
  crypto: ^3.0.3               # HMAC signature for QR security
  table_calendar: ^3.0.9      # For calendar view
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.0.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Image picker for event posters
  image_picker: ^1.0.7

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Local Storage (Offline Support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # State management (optional, use if you need Provider or Riverpod)
  # provider: ^6.1.2

  # Misc
  cupertino_icons: ^1.0.6
  file_picker: ^10.3.7
  url_launcher: ^6.3.2
  image: ^4.0.17  # Image compression

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Date formatting
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.66.0

  # Loading shimmer
  shimmer: ^3.0.0

  # PDF Generation
  pdf: ^3.11.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # ZIP Archive
  archive: ^4.0.2

  # HTTP Client
  http: ^1.4.0

  # Image Caching for Performance
  cached_network_image: ^3.3.1

  # Logging Framework
  logger: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Testing Dependencies
  mockito: ^5.4.4
  mocktail: ^1.0.3
  build_runner: ^2.4.8

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    # NOTE: .env is loaded at runtime via flutter_dotenv for development.
    # For production builds, use: flutter build apk --dart-define=SUPABASE_URL=... --dart-define=SUPABASE_ANON_KEY=...



  # Add your images/logos here as needed

# ============================================
# APP ICON CONFIGURATION
# ============================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/Event_Sphere_Logo.png"
  adaptive_icon_background: "#E8E4E0"
  adaptive_icon_foreground: "assets/icon/Event_Sphere_Logo.png"
  min_sdk_android: 21
